<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>تحليل الأحياء - نظام ربع سنوي</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { 
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, Arial, sans-serif; 
    background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); 
    min-height: 100vh; 
}

.top-bar { 
    position: fixed; 
    top: 0; left: 0; right: 0; 
    background: rgba(255,255,255,0.98); 
    padding: 10px 20px; 
    box-shadow: 0 4px 20px rgba(0,0,0,0.15); 
    z-index: 100000; 
    display: flex; 
    gap: 8px; 
    flex-wrap: wrap; 
    align-items: center; 
}
.top-bar input, .top-bar select, .top-bar button { 
    padding: 8px 14px; 
    border-radius: 10px; 
    border: 2px solid #e0e0e0; 
    font-size: 13px; 
}
.top-bar button { 
    background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); 
    color: white; 
    border: none; 
    cursor: pointer; 
    font-weight: 600; 
}
.btn-export { 
    background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%) !important; 
}

.main-container { 
    margin-top: 70px; 
    padding: 15px; 
    display: flex; 
    flex-direction: row;
    gap: 15px; 
    height: calc(100vh - 90px);
    min-height: 600px;
}

.map-wrapper { 
    background: white; 
    border-radius: 20px; 
    overflow: hidden; 
    box-shadow: 0 10px 40px rgba(0,0,0,0.2); 
    position: relative; 
    flex: 1.2;
    height: 100%;
    min-height: 500px;
    order: 2;
}
#map { height: 100%; width: 100%; z-index: 1; }

.map-table-overlay {
    position: absolute;
    bottom: 20px;
    left: 20px;
    background: rgba(255,255,255,0.95);
    border-radius: 12px;
    padding: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    z-index: 1000;
    min-width: 180px;
    border: 2px solid #1e3c72;
    max-height: 200px;
    overflow-y: auto;
}
.map-table-overlay h4 {
    margin: 0 0 8px 0;
    font-size: 13px;
    color: #1e3c72;
    text-align: center;
    border-bottom: 2px solid #1e3c72;
    padding-bottom: 5px;
}
.map-table-overlay table {
    width: 100%;
    font-size: 11px;
    border-collapse: collapse;
}
.map-table-overlay th {
    background: #1e3c72;
    color: white;
    padding: 6px;
    text-align: center;
    font-size: 10px;
}
.map-table-overlay td {
    padding: 5px;
    text-align: center;
    border-bottom: 1px solid #eee;
}

.municipality-label {
    background: rgba(255,255,255,0.95);
    border: 2px solid #1e3c72;
    border-radius: 10px;
    padding: 8px 12px;
    font-size: 14px;
    font-weight: bold;
    text-align: center;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    min-width: 140px;
    direction: rtl;
    cursor: move !important;
    user-select: none;
    position: absolute;
    z-index: 10000;
}
.municipality-label .muni-name {
    color: #1e3c72;
    font-size: 14px;
    margin-bottom: 3px;
    border-bottom: 2px solid #1e3c72;
    padding-bottom: 3px;
}
.municipality-label .muni-count {
    font-size: 16px;
    color: #e74c3c;
    font-weight: bold;
}

.custom-zoom { 
    position: absolute; 
    bottom: 30px; right: 30px; 
    background: white; 
    border-radius: 12px; 
    box-shadow: 0 4px 20px rgba(0,0,0,0.3); 
    display: flex; 
    flex-direction: column; 
    overflow: hidden; 
    z-index: 1000; 
    border: 2px solid #1e3c72; 
}
.zoom-btn { 
    width: 48px; height: 48px; 
    border: none; background: white; 
    font-size: 24px; cursor: pointer; 
    color: #1e3c72; font-weight: bold; 
}

.stats-section { 
    display: flex;
    flex-direction: column;
    gap: 15px; 
    flex: 1;
    height: 100%;
    min-width: 350px;
    order: 1;
}

.card { 
    background: white; 
    border-radius: 20px; 
    padding: 20px; 
    box-shadow: 0 10px 40px rgba(0,0,0,0.15); 
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}
.card-title { 
    font-size: 20px; font-weight: 800; color: #1a1a1a; 
    margin-bottom: 15px; padding-bottom: 10px; 
    border-bottom: 3px solid #1e3c72; 
    display: flex; align-items: center; gap: 8px; 
    flex-shrink: 0;
}
.quarter-badge { 
    background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); 
    color: white; padding: 4px 12px; border-radius: 20px; 
    font-size: 12px; font-weight: bold; 
}

.chart-scroll-container { 
    position: relative; flex: 1;
    overflow-y: auto; overflow-x: hidden; 
    border-radius: 10px; background: #f8f9fa; padding: 10px; 
}

#compareSection {
    display: none;
    margin-top: 20px;
    padding: 0 20px 20px 20px;
}

.compare-section { 
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 20px; 
}
.quarter-card { 
    background: white; border-radius: 15px; padding: 20px; 
    text-align: center; box-shadow: 0 5px 20px rgba(0,0,0,0.1); 
    border-top: 4px solid;
    position: relative;
}
.quarter-card.q1 { border-top-color: #e74c3c; } 
.quarter-card.q2 { border-top-color: #f39c12; } 
.quarter-card.q3 { border-top-color: #27ae60; } 
.quarter-card.q4 { border-top-color: #3498db; }
.quarter-title { font-size: 18px; font-weight: bold; color: #333; margin-bottom: 5px; }
.quarter-months { font-size: 11px; color: #666; margin-bottom: 10px; }
.quarter-value { font-size: 28px; font-weight: bold; color: #1e3c72; margin: 8px 0; }

/* Satisfaction boxes with unsatisfied */
.satisfaction-boxes { display: flex; gap: 8px; margin-top: 12px; justify-content: center; flex-wrap: wrap; }
.satisfaction-box { flex: 1; padding: 8px 5px; border-radius: 8px; text-align: center; font-size: 11px; min-width: 70px; position: relative; }
.satisfaction-box.satisfied { background: linear-gradient(135deg, #d4edda 0%, #c3e6cb 100%); border: 2px solid #28a745; }
.satisfaction-box.unsatisfied { background: linear-gradient(135deg, #f8d7da 0%, #f5c6cb 100%); border: 2px solid #dc3545; }
.satisfaction-box.participation { background: linear-gradient(135deg, #d1ecf1 0%, #bee5eb 100%); border: 2px solid #17a2b8; }
.satisfaction-box.average { background: linear-gradient(135deg, #fff3cd 0%, #ffeeba 100%); border: 2px solid #ffc107; }
.satisfaction-box .label { font-weight: bold; margin-bottom: 3px; font-size: 10px; }
.satisfaction-box.satisfied .label { color: #155724; }
.satisfaction-box.unsatisfied .label { color: #721c24; }
.satisfaction-box.participation .label { color: #0c5460; }
.satisfaction-box.average .label { color: #856404; }
.satisfaction-box .percentage { font-size: 16px; font-weight: bold; }
.satisfaction-box.satisfied .percentage { color: #28a745; }
.satisfaction-box.unsatisfied .percentage { color: #dc3545; }
.satisfaction-box.participation .percentage { color: #17a2b8; }
.satisfaction-box.average .percentage { color: #856404; }
.satisfaction-box .count { font-size: 10px; color: #666; margin-top: 2px; }

/* Close button for unsatisfied box */
.close-btn {
    position: absolute;
    top: -8px;
    left: -8px;
    background: #dc3545;
    color: white;
    border: none;
    border-radius: 50%;
    width: 20px;
    height: 20px;
    font-size: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
}

/* Editable satisfaction inputs */
.satisfaction-box input.percentage-input {
    width: 40px;
    border: 2px solid transparent;
    background: rgba(255,255,255,0.6);
    font-size: 16px;
    font-weight: bold;
    text-align: center;
    color: inherit;
    padding: 2px 4px;
    margin: 0;
    border-radius: 4px;
    font-family: inherit;
}
.satisfaction-box input.percentage-input:focus {
    outline: none;
    background: white;
    border-color: #1e3c72;
}

/* Summary Section - 3 boxes */
.summary-section {
    display: none;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
    margin-bottom: 20px;
    padding: 0 20px;
}
.summary-box {
    background: white;
    border-radius: 15px;
    padding: 20px;
    text-align: center;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    border: 3px solid;
    position: relative;
}
.summary-box.participation-total { border-color: #17a2b8; background: linear-gradient(135deg, #d1ecf1 0%, #bee5eb 100%); }
.summary-box.satisfied-total { border-color: #28a745; background: linear-gradient(135deg, #d4edda 0%, #c3e6cb 100%); }
.summary-box.unsatisfied-total { border-color: #dc3545; background: linear-gradient(135deg, #f8d7da 0%, #f5c6cb 100%); }
.summary-box .summary-title {
    font-size: 16px;
    font-weight: bold;
    margin-bottom: 10px;
}
.summary-box.participation-total .summary-title { color: #0c5460; }
.summary-box.satisfied-total .summary-title { color: #155724; }
.summary-box.unsatisfied-total .summary-title { color: #721c24; }
.summary-box .summary-value {
    font-size: 32px;
    font-weight: bold;
    margin: 10px 0;
}
.summary-box.participation-total .summary-value { color: #17a2b8; }
.summary-box.satisfied-total .summary-value { color: #28a745; }
.summary-box.unsatisfied-total .summary-value { color: #dc3545; }
.summary-box input.summary-input {
    width: 60px;
    border: 2px solid transparent;
    background: rgba(255,255,255,0.8);
    font-size: 28px;
    font-weight: bold;
    text-align: center;
    color: inherit;
    padding: 5px;
    border-radius: 8px;
    font-family: inherit;
}
.summary-box input.summary-input:focus {
    outline: none;
    background: white;
    border-color: #1e3c72;
}
.summary-close-btn {
    position: absolute;
    top: 10px;
    left: 10px;
    background: #dc3545;
    color: white;
    border: none;
    border-radius: 50%;
    width: 25px;
    height: 25px;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
}
.hidden { display: none !important; }

@media (max-width: 1400px) { 
    .main-container { flex-direction: column; height: auto; }
    .map-wrapper { flex: none; height: 60vh; min-height: 400px; order: 1; }
    .stats-section { flex: none; min-width: auto; order: 2; }
    .compare-section { grid-template-columns: repeat(2, 1fr); }
    .summary-section { grid-template-columns: 1fr; }
}
@media (max-width: 768px) { 
    .main-container { flex-direction: column; }
    .map-wrapper { height: 50vh; order: 1; }
    .stats-section { order: 2; }
    .compare-section { grid-template-columns: 1fr; }
    .summary-section { grid-template-columns: 1fr; }
}
</style>
</head>

<body>

<div class="top-bar">
    <input type="file" id="file" accept=".xlsx,.xls">
    <button onclick="loadExcel()">📁 رفع ملف Excel</button>
    <select id="quarterFilter" onchange="applyCurrentFilter()">
        <option value="all">📅 كل الأرباع</option>
        <option value="Q1">الربع الأول</option>
        <option value="Q2">الربع الثاني</option>
        <option value="Q3">الربع الثالث</option>
        <option value="Q4">الربع الرابع</option>
    </select>
    <select id="municipalityFilter" onchange="applyCurrentFilter()"><option value="all">🏛️ كل البلديات</option></select>
    <select id="filterSelect" onchange="applyCurrentFilter()">
        <option value="all">📊 كل البلديات</option>
        <option value="5">🔥 أعلى 5</option>
        <option value="10">🔥 أعلى 10</option>
        <option value="20">🔥 أعلى 20</option>
    </select>
    <input id="searchBox" placeholder="🔍 بحث عن بلدية..." oninput="applyCurrentFilter()">
    <button onclick="fitAll()">🌍 إظهار الكل</button>
    <button class="btn-export" onclick="exportSlide()">📸 تصدير سلايد</button>
    <button onclick="showQuarterComparison()">📊 مقارنة الأرباع</button>
    <button onclick="exportExcel()">📊 Excel</button>
    <button onclick="resetSatisfactionValues()" style="background: #2ecc71 !important;">🔄 إعادة ضبط النسب</button>
    <button onclick="clearAllData()" style="background: #ff4757 !important;">🗑️ مسح</button>
</div>

<div class="main-container" id="captureArea">
    <div class="stats-section" id="statsSection">
        <div class="card">
            <div class="card-title">📊 توزيع البلديات <span class="quarter-badge" id="currentQuarterBadge">الكل</span></div>
            <div class="chart-scroll-container">
                <div class="chart-canvas-wrapper" id="chartWrapper">
                    <canvas id="chart"></canvas>
                </div>
            </div>
        </div>
    </div>
    <div class="map-wrapper" id="mapSection">
        <div id="map"></div>
        <div id="labelsContainer" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1000;"></div>
        <div class="map-table-overlay" id="mapTableOverlay">
            <h4>📅 توزيع البلاغات</h4>
            <table><thead><tr><th>الشهر</th><th>البلاغات</th></tr></thead><tbody id="mapTableBody"></tbody></table>
        </div>
        <div class="custom-zoom">
            <button class="zoom-btn" onclick="map.zoomIn()">+</button>
            <button class="zoom-btn" onclick="map.zoomOut()">−</button>
        </div>
    </div>
</div>

<!-- Summary Section - 3 Total Boxes -->
<div class="summary-section" id="summarySection">
    <div class="summary-box participation-total">
        <div class="summary-title">📊 إجمالي نسبة المشاركين</div>
        <div class="summary-value"><input type="number" class="summary-input" id="summary-participation" value="0" min="0" max="100" onchange="updateSummaryValue('participation')">%</div>
    </div>
    <div class="summary-box satisfied-total">
        <div class="summary-title">😊 إجمالي نسبة الراضين</div>
        <div class="summary-value"><input type="number" class="summary-input" id="summary-satisfied" value="0" min="0" max="100" onchange="updateSummaryValue('satisfied')">%</div>
    </div>
    <div class="summary-box unsatisfied-total" id="unsatisfiedSummaryBox">
        <button class="summary-close-btn" onclick="hideUnsatisfiedSummary()">×</button>
        <div class="summary-title">😞 إجمالي نسبة غير الراضين</div>
        <div class="summary-value"><input type="number" class="summary-input" id="summary-unsatisfied" value="0" min="0" max="100" onchange="updateSummaryValue('unsatisfied')">%</div>
    </div>
</div>

<div id="compareSection">
    <div class="card">
        <div class="card-title">📊 مقارنة الأداء الربع سنوي</div>
        <div class="compare-section" id="quarterComparison"></div>
    </div>
</div>

<div id="slideExportContainer" style="display: none;"></div>

<script>
Chart.register(ChartDataLabels);

let map = null, polygonLayer = null, rawData = [], visibleMunicipalities = [], chart = null, allMunicipalities = new Set(), isCompareVisible = false;
let labelPositions = {};
let isDragging = false;
let draggedLabel = null;
let dragOffset = { x: 0, y: 0 };

const municipalityColors = ['#e74c3c', '#3498db', '#2ecc71', '#f39c12', '#9b59b6', '#1abc9c', '#e67e22', '#34495e', '#16a085', '#c0392b', '#2980b9', '#8e44ad', '#27ae60', '#f1c40f', '#e91e63'];

const monthNames = {
    arabic: ['يناير', 'فبراير', 'مارس', 'إبريل', 'مايو', 'يونيو', 'يوليو', 'أغسطس', 'سبتمبر', 'أكتوبر', 'نوفمبر', 'ديسمبر'],
    english: ['january', 'february', 'march', 'april', 'may', 'june', 'july', 'august', 'september', 'october', 'november', 'december']
};

const getQuarterFromDate = (dateStr) => {
    if (!dateStr || dateStr === 'غير معروف' || dateStr === '') return null;
    dateStr = String(dateStr).toLowerCase().trim();
    let month = null;
    for (let i = 0; i < monthNames.arabic.length; i++) {
        if (dateStr.includes(monthNames.arabic[i].toLowerCase())) { month = i + 1; break; }
    }
    if (!month) {
        for (let i = 0; i < monthNames.english.length; i++) {
            if (dateStr.includes(monthNames.english[i])) { month = i + 1; break; }
        }
    }
    if (!month && dateStr.includes('/')) {
        const parts = dateStr.split('/');
        if (parts.length >= 2) {
            let m1 = parseInt(parts[0]), m2 = parseInt(parts[1]);
            month = (m1 > 12 && m2 <= 12) ? m2 : m1;
        }
    }
    if (!month && dateStr.includes('-')) {
        const parts = dateStr.split('-');
        if (parts.length >= 3) {
            let m1 = parseInt(parts[0]), m2 = parseInt(parts[1]);
            month = (m1 > 31) ? m2 : (m2 > 12 ? m1 : m1);
        } else if (parts.length === 2) {
            month = parseInt(parts[0]);
        }
    }
    if (!month && dateStr.match(/(?:^|[^\d])([1-9]|1[0-2])(?:[^\d]|$)/)) {
        month = parseInt(dateStr.match(/(?:^|[^\d])([1-9]|1[0-2])(?:[^\d]|$)/)[1]);
    }
    if (!month || isNaN(month) || month < 1 || month > 12) return null;
    if (month <= 3) return 'Q1';
    if (month <= 6) return 'Q2';
    if (month <= 9) return 'Q3';
    return 'Q4';
};

const getMonthFromDate = (dateStr) => {
    if (!dateStr || dateStr === 'غير معروف' || dateStr === '') return null;
    dateStr = String(dateStr).toLowerCase().trim();
    let month = null;
    for (let i = 0; i < monthNames.arabic.length; i++) {
        if (dateStr.includes(monthNames.arabic[i].toLowerCase())) { month = i + 1; break; }
    }
    if (!month) {
        for (let i = 0; i < monthNames.english.length; i++) {
            if (dateStr.includes(monthNames.english[i])) { month = i + 1; break; }
        }
    }
    if (!month && dateStr.includes('/')) {
        const parts = dateStr.split('/');
        if (parts.length >= 2) {
            let m1 = parseInt(parts[0]), m2 = parseInt(parts[1]);
            month = (m1 > 12 && m2 <= 12) ? m2 : m1;
        }
    }
    if (!month && dateStr.includes('-')) {
        const parts = dateStr.split('-');
        if (parts.length >= 3) {
            let m1 = parseInt(parts[0]), m2 = parseInt(parts[1]);
            month = (m1 > 31) ? m2 : (m2 > 12 ? m1 : m1);
        } else if (parts.length === 2) {
            month = parseInt(parts[0]);
        }
    }
    if (!month && dateStr.match(/(?:^|[^\d])([1-9]|1[0-2])(?:[^\d]|$)/)) {
        month = parseInt(dateStr.match(/(?:^|[^\d])([1-9]|1[0-2])(?:[^\d]|$)/)[1]);
    }
    return month;
};

// Manual satisfaction values with unsatisfied
let manualSatisfactionValues = { 
    Q1: { satisfied: null, unsatisfied: null, participation: null }, 
    Q2: { satisfied: null, unsatisfied: null, participation: null }, 
    Q3: { satisfied: null, unsatisfied: null, participation: null }, 
    Q4: { satisfied: null, unsatisfied: null, participation: null } 
};

// Summary values
let summaryValues = {
    participation: null,
    satisfied: null,
    unsatisfied: null
};

function updateSatisfactionCount(quarter, type) {
    const input = document.getElementById(`sat-${quarter}-${type}`);
    let value = parseInt(input.value) || 0;
    if (value < 0) value = 0;
    if (value > 100) value = 100;
    input.value = value;
    manualSatisfactionValues[quarter][type] = value;
    
    // Auto-calculate participation = satisfied + unsatisfied
    if (type === 'satisfied' || type === 'unsatisfied') {
        const sat = manualSatisfactionValues[quarter].satisfied || 0;
        const unsat = manualSatisfactionValues[quarter].unsatisfied || 0;
        const participation = Math.min(sat + unsat, 100);
        manualSatisfactionValues[quarter].participation = participation;
        const partInput = document.getElementById(`sat-${quarter}-participation`);
        if (partInput) partInput.value = participation;
    }
}

function validatePercentage(quarter) {
    const satInput = document.getElementById(`sat-${quarter}-satisfied`);
    let sat = parseInt(satInput.value) || 0;
    if (sat < 0) sat = 0;
    if (sat > 100) sat = 100;
    satInput.value = sat;
    manualSatisfactionValues[quarter].satisfied = sat;
}

function resetSatisfactionValues() {
    manualSatisfactionValues = { 
        Q1: { satisfied: null, unsatisfied: null, participation: null }, 
        Q2: { satisfied: null, unsatisfied: null, participation: null }, 
        Q3: { satisfied: null, unsatisfied: null, participation: null }, 
        Q4: { satisfied: null, unsatisfied: null, participation: null } 
    };
    summaryValues = { participation: null, satisfied: null, unsatisfied: null };
    updateQuarterComparison();
    updateSummarySection();
    showNotification('✅ تم إعادة ضبط النسب للقيم المحسوبة');
}

// Hide unsatisfied summary box
function hideUnsatisfiedSummary() {
    document.getElementById('unsatisfiedSummaryBox').classList.add('hidden');
}

// Hide unsatisfied box for specific quarter
function hideUnsatisfiedBox(quarter) {
    const box = document.getElementById(`unsat-box-${quarter}`);
    if (box) box.classList.add('hidden');
}

// Update summary values
function updateSummaryValue(type) {
    const input = document.getElementById(`summary-${type}`);
    let value = parseInt(input.value) || 0;
    if (value < 0) value = 0;
    if (value > 100) value = 100;
    input.value = value;
    summaryValues[type] = value;
}

// Update summary section display
function updateSummarySection() {
    // Calculate totals from quarters
    const totals = { participation: 0, satisfied: 0, unsatisfied: 0 };
    let count = 0;
    
    ['Q1', 'Q2', 'Q3', 'Q4'].forEach(q => {
        if (manualSatisfactionValues[q].participation !== null) {
            totals.participation += manualSatisfactionValues[q].participation;
            totals.satisfied += manualSatisfactionValues[q].satisfied || 0;
            totals.unsatisfied += manualSatisfactionValues[q].unsatisfied || 0;
            count++;
        }
    });
    
    if (count > 0) {
        if (summaryValues.participation === null) {
            document.getElementById('summary-participation').value = Math.round(totals.participation / count);
        }
        if (summaryValues.satisfied === null) {
            document.getElementById('summary-satisfied').value = Math.round(totals.satisfied / count);
        }
        if (summaryValues.unsatisfied === null) {
            document.getElementById('summary-unsatisfied').value = Math.round(totals.unsatisfied / count);
        }
    }
}

function initMap() {
    const mapElement = document.getElementById('map');
    if (!mapElement) return;
    map = L.map('map', { zoomControl: false, attributionControl: false, preferCanvas: true }).setView([24.7136, 46.6753], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);
    polygonLayer = L.layerGroup().addTo(map);
}

function loadExcel() {
    const file = document.getElementById("file").files[0];
    if (!file) { alert('الرجاء اختيار ملف'); return; }
    const reader = new FileReader();
    reader.onload = e => {
        const wb = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
        const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1 });
        processRows(rows);
    };
    reader.readAsArrayBuffer(file);
}

function processRows(rows) {
    rawData = [];
    allMunicipalities.clear();
    const districtMap = {};
    let monthlyCounts = {};

    for (let i = 1; i < rows.length; i++) {
        let r = rows[i];
        if (!r || r.length < 3) continue;
        let lng = parseFloat(r[0]), lat = parseFloat(r[1]);
        let name = String(r[2] || "غير معروف").trim();
        let muni = String(r[3] || "غير محدد").trim();
        let date = r[4];
        let satisfaction = String(r[6] || "").trim();
        if (isNaN(lat) || isNaN(lng)) continue;
        if (typeof date === 'number') {
            const excelEpoch = new Date(1899, 11, 30);
            date = new Date(excelEpoch.getTime() + date * 24 * 60 * 60 * 1000).getMonth() + 1;
        }
        allMunicipalities.add(muni);
        const quarter = getQuarterFromDate(date);
        const month = getMonthFromDate(date);

        if (month) {
            if (!monthlyCounts[month]) monthlyCounts[month] = 0;
            monthlyCounts[month]++;
        }

        const key = name + "||" + muni;
        if (!districtMap[key]) {
            districtMap[key] = { name: name, municipality: muni, lat: lat, lng: lng, totalCount: 0, quarters: { Q1: 0, Q2: 0, Q3: 0, Q4: 0 }, satisfaction: { satisfied: 0, unsatisfied: 0 }, monthly: {} };
        }
        districtMap[key].totalCount++;
        if (quarter) { districtMap[key].quarters[quarter]++; }
        if (month) {
            if (!districtMap[key].monthly[month]) districtMap[key].monthly[month] = 0;
            districtMap[key].monthly[month]++;
        }
        if (satisfaction.includes('راضي') && !satisfaction.includes('غير')) districtMap[key].satisfaction.satisfied++;
        else if (satisfaction.includes('غير')) districtMap[key].satisfaction.unsatisfied++;
    }

    const muniMap = {};
    Object.values(districtMap).forEach(d => {
        if (!muniMap[d.municipality]) {
            muniMap[d.municipality] = { name: d.municipality, districts: [], totalCount: 0, quarters: { Q1: 0, Q2: 0, Q3: 0, Q4: 0 }, points: [], satisfaction: { Q1: {satisfied: 0, unsatisfied: 0}, Q2: {satisfied: 0, unsatisfied: 0}, Q3: {satisfied: 0, unsatisfied: 0}, Q4: {satisfied: 0, unsatisfied: 0} }, monthly: {} };
        }
        muniMap[d.municipality].districts.push(d);
        muniMap[d.municipality].totalCount += d.totalCount;
        muniMap[d.municipality].quarters.Q1 += d.quarters.Q1;
        muniMap[d.municipality].quarters.Q2 += d.quarters.Q2;
        muniMap[d.municipality].quarters.Q3 += d.quarters.Q3;
        muniMap[d.municipality].quarters.Q4 += d.quarters.Q4;
        muniMap[d.municipality].points.push([d.lng, d.lat]);

        for (let month in d.monthly) {
            if (!muniMap[d.municipality].monthly[month]) muniMap[d.municipality].monthly[month] = 0;
            muniMap[d.municipality].monthly[month] += d.monthly[month];
        }

        if (d.quarters.Q1 > 0) { muniMap[d.municipality].satisfaction.Q1.satisfied += d.satisfaction.satisfied; muniMap[d.municipality].satisfaction.Q1.unsatisfied += d.satisfaction.unsatisfied; }
        if (d.quarters.Q2 > 0) { muniMap[d.municipality].satisfaction.Q2.satisfied += d.satisfaction.satisfied; muniMap[d.municipality].satisfaction.Q2.unsatisfied += d.satisfaction.unsatisfied; }
        if (d.quarters.Q3 > 0) { muniMap[d.municipality].satisfaction.Q3.satisfied += d.satisfaction.satisfied; muniMap[d.municipality].satisfaction.Q3.unsatisfied += d.satisfaction.unsatisfied; }
        if (d.quarters.Q4 > 0) { muniMap[d.municipality].satisfaction.Q4.satisfied += d.satisfaction.satisfied; muniMap[d.municipality].satisfaction.Q4.unsatisfied += d.satisfaction.unsatisfied; }
    });

    Object.values(muniMap).forEach(m => {
        m.districts.sort((a, b) => b.totalCount - a.totalCount);
        m.topDistricts = m.districts.slice(0, 4);
        m.color = municipalityColors[Object.keys(muniMap).indexOf(m.name) % municipalityColors.length];
    });

    rawData = Object.values(muniMap).sort((a, b) => b.totalCount - a.totalCount);

    window.globalMonthlyCounts = monthlyCounts;

    fillSelect("municipalityFilter", allMunicipalities);
    showNotification(`✅ تم تحميل ${rawData.length} بلدية`);
    applyCurrentFilter();
}

function fillSelect(id, set) {
    let el = document.getElementById(id);
    el.innerHTML = '<option value="all">' + (id === 'municipalityFilter' ? '🏛️ كل البلديات' : '📅 كل الأشهر') + '</option>';
    [...set].sort().forEach(v => { el.innerHTML += `<option value="${v}">${v}</option>`; });
}

function createDraggableLabel(muni, count, container) {
    let left = 0, top = 0;
    if (labelPositions[muni.name]) {
        left = labelPositions[muni.name].x;
        top = labelPositions[muni.name].y;
    } else {
        const lats = muni.points.map(p => p[1]), lngs = muni.points.map(p => p[0]);
        const centerLat = lats.reduce((a, b) => a + b, 0) / lats.length;
        const centerLng = lngs.reduce((a, b) => a + b, 0) / lngs.length;
        const point = map.latLngToContainerPoint([centerLat, centerLng]);
        left = point.x - 70;
        top = point.y - 30;
    }

    const label = document.createElement('div');
    label.className = 'municipality-label';
    label.innerHTML = `<div class="muni-name">${muni.name}</div><div class="muni-count">${count.toLocaleString()} بلاغ</div>`;
    label.style.left = left + 'px';
    label.style.top = top + 'px';
    label.style.pointerEvents = 'auto';
    label.style.borderColor = muni.color;

    label.addEventListener('mousedown', function(e) {
        isDragging = true;
        draggedLabel = label;
        draggedLabel.classList.add('dragging');
        dragOffset.x = e.clientX - label.offsetLeft;
        dragOffset.y = e.clientY - label.offsetTop;
        e.preventDefault();
        e.stopPropagation();
    });

    container.appendChild(label);
    return label;
}

document.addEventListener('mousemove', function(e) {
    if (!isDragging || !draggedLabel) return;
    const newX = e.clientX - dragOffset.x;
    const newY = e.clientY - dragOffset.y;
    draggedLabel.style.left = newX + 'px';
    draggedLabel.style.top = newY + 'px';
});

document.addEventListener('mouseup', function() {
    if (isDragging && draggedLabel) {
        const muniName = draggedLabel.querySelector('.muni-name').textContent;
        labelPositions[muniName] = {
            x: draggedLabel.offsetLeft,
            y: draggedLabel.offsetTop
        };
        draggedLabel.classList.remove('dragging');
        isDragging = false;
        draggedLabel = null;
    }
});

function updateMapTable() {
    const tbody = document.getElementById('mapTableBody');
    tbody.innerHTML = '';

    let monthlyData = {};

    visibleMunicipalities.forEach(muni => {
        for (let month in muni.monthly) {
            if (!monthlyData[month]) monthlyData[month] = 0;
            monthlyData[month] += muni.monthly[month];
        }
    });

    if (Object.keys(monthlyData).length === 0 && window.globalMonthlyCounts) {
        monthlyData = window.globalMonthlyCounts;
    }

    const sortedMonths = Object.keys(monthlyData).sort((a, b) => parseInt(a) - parseInt(b));

    if (sortedMonths.length === 0) {
        tbody.innerHTML = '<tr><td colspan="2">لا توجد بيانات</td></tr>';
        return;
    }

    sortedMonths.forEach(month => {
        const monthName = monthNames.arabic[parseInt(month) - 1];
        const count = monthlyData[month];
        const row = document.createElement('tr');
        row.innerHTML = `<td>${monthName}</td><td>${count.toLocaleString()}</td>`;
        tbody.appendChild(row);
    });
}

function applyCurrentFilter() {
    const quarter = document.getElementById("quarterFilter").value;
    const muni = document.getElementById("municipalityFilter").value;
    const top = document.getElementById("filterSelect").value;
    const search = document.getElementById("searchBox").value.toLowerCase();
    const quarterNames = { 'all': 'الكل', 'Q1': 'الربع الأول', 'Q2': 'الربع الثاني', 'Q3': 'الربع الثالث', 'Q4': 'الربع الرابع' };
    document.getElementById("currentQuarterBadge").textContent = quarterNames[quarter] || quarter;
    let filtered = rawData.filter(d => (muni === "all" || d.name === muni) && d.name.toLowerCase().includes(search));
    if (quarter !== "all") {
        filtered.sort((a, b) => b.quarters[quarter] - a.quarters[quarter]);
        filtered = filtered.filter(d => d.quarters[quarter] > 0);
    }
    visibleMunicipalities = filtered.slice(0, top === "all" ? Infinity : parseInt(top));

    drawMap();
    drawChart();
    buildExport();
    updateMapTable();
    if (isCompareVisible) {
        updateQuarterComparison();
        updateSummarySection();
    }
}

function createPolygonFromPoints(points, color) {
    if (points.length < 3) {
        const center = points.reduce((acc, p) => [acc[0] + p[0], acc[1] + p[1]], [0, 0]);
        center[0] /= points.length; center[1] /= points.length;
        const radius = 0.01;
        const circlePoints = [];
        for (let i = 0; i < 36; i++) {
            const angle = (i * 10) * Math.PI / 180;
            circlePoints.push([center[0] + radius * Math.cos(angle), center[1] + radius * Math.sin(angle)]);
        }
        return L.polygon(circlePoints.map(p => [p[1], p[0]]), { color: color, fillColor: color, fillOpacity: 0.3, weight: 3 });
    }
    try {
        const pointsCollection = turf.points(points);
        const hull = turf.convex(pointsCollection);
        if (hull) {
            const coords = hull.geometry.coordinates[0].map(c => [c[1], c[0]]);
            return L.polygon(coords, { color: color, fillColor: color, fillOpacity: 0.3, weight: 3 });
        }
    } catch (e) {}
    const lats = points.map(p => p[1]), lngs = points.map(p => p[0]);
    const bounds = [[Math.min(...lats) - 0.01, Math.min(...lngs) - 0.01], [Math.max(...lats) + 0.01, Math.max(...lngs) + 0.01]];
    return L.rectangle(bounds, { color: color, fillColor: color, fillOpacity: 0.3, weight: 3 });
}

function drawMap() {
    if (!polygonLayer) return;
    polygonLayer.clearLayers();

    const labelsContainer = document.getElementById('labelsContainer');
    labelsContainer.innerHTML = '';

    if (visibleMunicipalities.length === 0) return;
    const quarter = document.getElementById("quarterFilter").value;

    visibleMunicipalities.forEach(muni => {
        const count = quarter === "all" ? muni.totalCount : muni.quarters[quarter];

        const polygon = createPolygonFromPoints(muni.points, muni.color);
        polygon.addTo(polygonLayer);

        createDraggableLabel(muni, count, labelsContainer);
    });

    if (visibleMunicipalities.length > 0 && map) {
        const allPoints = visibleMunicipalities.flatMap(m => m.points.map(p => [p[1], p[0]]));
        if (allPoints.length > 0) map.fitBounds(allPoints, { padding: [100, 100], maxZoom: 12 });
    }
}

function drawChart() {
    if (chart) chart.destroy();
    const ctx = document.getElementById("chart").getContext("2d");
    const quarter = document.getElementById("quarterFilter").value;
    const labels = visibleMunicipalities.map(m => m.name);
    const data = visibleMunicipalities.map(m => quarter === "all" ? m.totalCount : m.quarters[quarter]);
    const colors = visibleMunicipalities.map(m => m.color);
    const canvasHeight = Math.max(400, labels.length * 50);
    document.getElementById("chart").height = canvasHeight;
    document.getElementById("chartWrapper").style.height = canvasHeight + 'px';
    chart = new Chart(ctx, {
        type: 'bar',
        data: { labels: labels, datasets: [{ data: data, backgroundColor: colors, borderRadius: 8, borderSkipped: false, barThickness: 30 }] },
        options: {
            responsive: true, maintainAspectRatio: false, animation: false, indexAxis: 'y',
            plugins: { legend: { display: false }, datalabels: { anchor: 'end', align: 'right', color: '#333', font: { weight: 'bold', size: 12 }, formatter: (value) => value.toLocaleString(), offset: 5 } },
            scales: { x: { beginAtZero: true, grid: { color: 'rgba(0,0,0,0.05)' }, ticks: { callback: function(value) { return value.toLocaleString(); } } }, y: { grid: { display: false }, ticks: { font: { size: 12, weight: '600' }, autoSkip: false } } }
        }
    });
}

function updateQuarterComparison() {
    const container = document.getElementById("quarterComparison");
    const totals = { Q1: 0, Q2: 0, Q3: 0, Q4: 0 };
    const satisfactionTotals = { Q1: { satisfied: 0, unsatisfied: 0 }, Q2: { satisfied: 0, unsatisfied: 0 }, Q3: { satisfied: 0, unsatisfied: 0 }, Q4: { satisfied: 0, unsatisfied: 0 } };

    rawData.forEach(m => {
        totals.Q1 += m.quarters.Q1; totals.Q2 += m.quarters.Q2; totals.Q3 += m.quarters.Q3; totals.Q4 += m.quarters.Q4;
        satisfactionTotals.Q1.satisfied += m.satisfaction.Q1.satisfied; satisfactionTotals.Q1.unsatisfied += m.satisfaction.Q1.unsatisfied;
        satisfactionTotals.Q2.satisfied += m.satisfaction.Q2.satisfied; satisfactionTotals.Q2.unsatisfied += m.satisfaction.Q2.unsatisfied;
        satisfactionTotals.Q3.satisfied += m.satisfaction.Q3.satisfied; satisfactionTotals.Q3.unsatisfied += m.satisfaction.Q3.unsatisfied;
        satisfactionTotals.Q4.satisfied += m.satisfaction.Q4.satisfied; satisfactionTotals.Q4.unsatisfied += m.satisfaction.Q4.unsatisfied;
    });

    const quarters = [{ key: 'Q1', name: 'الربع الأول', color: '#e74c3c' }, { key: 'Q2', name: 'الربع الثاني', color: '#f39c12' }, { key: 'Q3', name: 'الربع الثالث', color: '#27ae60' }, { key: 'Q4', name: 'الربع الرابع', color: '#3498db' }];
    const maxTotal = Math.max(...Object.values(totals), 1);
    const months = ['يناير-مارس', 'إبريل-يونيو', 'يوليو-سبتمبر', 'أكتوبر-ديسمبر'];

    const avgReports = { Q1: 0, Q2: 0, Q3: 0, Q4: 0 };
    const muniCount = rawData.length || 1;
    avgReports.Q1 = Math.round(totals.Q1 / muniCount);
    avgReports.Q2 = Math.round(totals.Q2 / muniCount);
    avgReports.Q3 = Math.round(totals.Q3 / muniCount);
    avgReports.Q4 = Math.round(totals.Q4 / muniCount);

    container.innerHTML = quarters.map((q, i) => {
        const total = totals[q.key];
        const sat = satisfactionTotals[q.key];
        const totalSat = sat.satisfied + sat.unsatisfied;
        
        // Calculate percentages
        let satisfiedPercent, unsatisfiedPercent, participationPercent;
        
        if (manualSatisfactionValues[q.key].satisfied !== null) {
            satisfiedPercent = manualSatisfactionValues[q.key].satisfied;
        } else {
            satisfiedPercent = totalSat > 0 ? Math.round((sat.satisfied / totalSat) * 100) : 0;
        }
        
        if (manualSatisfactionValues[q.key].unsatisfied !== null) {
            unsatisfiedPercent = manualSatisfactionValues[q.key].unsatisfied;
        } else {
            unsatisfiedPercent = totalSat > 0 ? Math.round((sat.unsatisfied / totalSat) * 100) : 0;
        }
        
        // Participation = satisfied + unsatisfied (auto-calculated)
        participationPercent = manualSatisfactionValues[q.key].participation !== null ? 
            manualSatisfactionValues[q.key].participation : 
            Math.min(satisfiedPercent + unsatisfiedPercent, 100);
        
        const avgValue = avgReports[q.key];

        return `<div class="quarter-card ${q.key.toLowerCase()}">
            <div class="quarter-title">${q.name}</div>
            <div class="quarter-months">${months[i]}</div>
            <div class="quarter-value" style="color:${q.color};">${total.toLocaleString()}</div>
            <div style="margin:10px 0;background:#eee;height:8px;border-radius:4px;overflow:hidden;">
                <div style="width:${(total / maxTotal * 100)}%;height:100%;background:${q.color};"></div>
            </div>
            <div class="satisfaction-boxes">
                <div class="satisfaction-box participation">
                    <div class="label">نسبة المشاركين</div>
                    <div class="percentage">
                        <input type="number" class="percentage-input" id="sat-${q.key}-participation" value="${participationPercent}" min="0" max="100" onchange="updateSatisfactionCount('${q.key}', 'participation')">%
                    </div>
                </div>
                <div class="satisfaction-box satisfied">
                    <div class="label">نسبة الرضا</div>
                    <div class="percentage">
                        <input type="number" class="percentage-input" id="sat-${q.key}-satisfied" value="${satisfiedPercent}" min="0" max="100" onchange="updateSatisfactionCount('${q.key}', 'satisfied')" onblur="validatePercentage('${q.key}')">%
                    </div>
                </div>
                <div class="satisfaction-box unsatisfied" id="unsat-box-${q.key}">
                    <button class="close-btn" onclick="hideUnsatisfiedBox('${q.key}')">×</button>
                    <div class="label">نسبة عدم الرضا</div>
                    <div class="percentage">
                        <input type="number" class="percentage-input" id="sat-${q.key}-unsatisfied" value="${unsatisfiedPercent}" min="0" max="100" onchange="updateSatisfactionCount('${q.key}', 'unsatisfied')">%
                    </div>
                </div>
                <div class="satisfaction-box average">
                    <div class="label">متوسط البلاغات</div>
                    <div class="percentage">${avgValue.toLocaleString()}</div>
                </div>
            </div>
        </div>`;
    }).join('');
}

function showQuarterComparison() {
    const section = document.getElementById("compareSection");
    const summarySection = document.getElementById("summarySection");
    if (!isCompareVisible) {
        section.style.display = "block";
        summarySection.style.display = "grid";
        isCompareVisible = true;
        updateQuarterComparison();
        updateSummarySection();
        section.scrollIntoView({ behavior: 'smooth' });
    } else {
        section.style.display = "none";
        summarySection.style.display = "none";
        isCompareVisible = false;
    }
}

let exportRows = [];
function buildExport() {
    const quarter = document.getElementById("quarterFilter").value;
    exportRows = [["البلدية", "إجمالي البلاغات", "Q1", "Q2", "Q3", "Q4", "عدد الأحياء", "أعلى 4 أحياء"]];
    visibleMunicipalities.forEach(m => {
        let sortedDistricts = [...m.districts];
        if (quarter !== "all") sortedDistricts.sort((a, b) => b.quarters[quarter] - a.quarters[quarter]);
        const top4 = sortedDistricts.slice(0, 4);
        const top4Names = top4.map((d, i) => { const count = quarter === "all" ? d.totalCount : d.quarters[quarter]; return `${i+1}. ${d.name} (${count})`; }).join(" | ");
        exportRows.push([m.name, m.totalCount, m.quarters.Q1, m.quarters.Q2, m.quarters.Q3, m.quarters.Q4, m.districts.length, top4Names]);
    });
}

function exportExcel() {
    if (exportRows.length <= 1) { alert('لا توجد بيانات'); return; }
    let ws = XLSX.utils.aoa_to_sheet(exportRows);
    let wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "البلديات");
    XLSX.writeFile(wb, "تحليل_البلديات_الربع_سنوي.xlsx");
}

function fitAll() {
    if (visibleMunicipalities.length === 0 || !map) return;
    const allPoints = visibleMunicipalities.flatMap(m => m.points.map(p => [p[1], p[0]]));
    if (allPoints.length > 0) map.fitBounds(allPoints, { padding: [100, 100] });
}

function clearAllData() { 
    if (confirm('هل أنت متأكد؟')) {
        labelPositions = {};
        location.reload(); 
    }
}

function showNotification(message) {
    const notif = document.createElement('div');
    notif.style.cssText = 'position:fixed; top:90px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.85); color:white; padding:15px 30px; border-radius:30px; font-weight:600; z-index:100001;';
    notif.textContent = message;
    document.body.appendChild(notif);
    setTimeout(() => { notif.style.opacity = '0'; setTimeout(() => notif.remove(), 300); }, 3000);
}

document.addEventListener('DOMContentLoaded', function() { initMap(); });
